name: Review Guard

on:
  pull_request_review:
    types: [submitted]

jobs:
  jira-guard:
    name: Jira Guard
    permissions:
      pull-requests: read
      contents: read
    uses: byteit-ai/.github/.github/workflows/jira-guard.yml@main
    secrets:
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
