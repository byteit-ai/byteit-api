# в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ
#  Pre-merge release readiness checks for PRs to main.
#  Ensures versions, changelog, and tags are all in sync
#  BEFORE the merge вЂ” so publish-pypi.yml never fails.
# в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ
name: Release Readiness

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  release-check:
    name: Validate release readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine ruff

      - name: Ruff lint and format checks
        run: |
          python -m ruff check .
          python -m ruff format --check .

      # в”Ђв”Ђ 1. Extract version from pyproject.toml в”Ђв”Ђ
      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E '^version\s*=\s*"[0-9]+\.[0-9]+\.[0-9]+"' pyproject.toml \
            | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)"/\1/')

          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from pyproject.toml"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "вњ… pyproject.toml version: $VERSION"

      - name: Run release preflight script
        run: python scripts/release_preflight.py --pre-commit

      # в”Ђв”Ђ 2. __init__.py fallback matches pyproject.toml в”Ђв”Ђ
      - name: Check __init__.py fallback version
        run: |
          INIT_VERSION=$(grep -E '__version__\s*=\s*"[0-9]+\.[0-9]+\.[0-9]+"' byteit/__init__.py \
            | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')

          if [ -z "$INIT_VERSION" ]; then
            echo "::error::Could not extract fallback version from byteit/__init__.py"
            exit 1
          fi

          if [ "$INIT_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::byteit/__init__.py fallback ($INIT_VERSION) в‰  pyproject.toml (${{ steps.version.outputs.version }})"
            exit 1
          fi

          echo "вњ… __init__.py fallback matches: $INIT_VERSION"

      # в”Ђв”Ђ 3. CHANGELOG has a dated entry for this version в”Ђв”Ђ
      - name: Check CHANGELOG entry
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! grep -qE "^## \[$VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing dated entry for version $VERSION (expected: ## [$VERSION] - YYYY-MM-DD)"
            exit 1
          fi

          echo "вњ… CHANGELOG.md has dated entry for $VERSION"

      # в”Ђв”Ђ 4. [Unreleased] section has no content в”Ђв”Ђ
      - name: Check Unreleased section is empty
        run: |
          # Extract text between [Unreleased] and the next ## heading
          UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/{ /^## \[/d; p; }' CHANGELOG.md \
            | grep -v '^\s*$' || true)

          if [ -n "$UNRELEASED" ]; then
            echo "::error::[Unreleased] section still has content вЂ” move it to the [${{ steps.version.outputs.version }}] section"
            echo "Found:"
            echo "$UNRELEASED"
            exit 1
          fi

          echo "вњ… [Unreleased] section is empty"

      # в”Ђв”Ђ 5. Version is bumped compared to main в”Ђв”Ђ
      - name: Check version is bumped vs main
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:pyproject.toml \
            | grep -E '^version\s*=\s*"[0-9]+\.[0-9]+\.[0-9]+"' \
            | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)"/\1/')

          PR_VERSION="${{ steps.version.outputs.version }}"

          if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
            echo "::error::Version $PR_VERSION is the same as main вЂ” bump the version"
            exit 1
          fi

          # Compare semver (major.minor.patch) to ensure it's higher
          version_gt() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | tail -n1)" = "$1" ]
          }

          if ! version_gt "$PR_VERSION" "$MAIN_VERSION"; then
            echo "::error::PR version ($PR_VERSION) is not greater than main ($MAIN_VERSION)"
            exit 1
          fi

          echo "вњ… Version bumped: $MAIN_VERSION в†’ $PR_VERSION"

      # в”Ђв”Ђ 6. Last commit message is chore(release): X.Y.Z в”Ђв”Ђ
      - name: Check last commit message
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s ${{ github.event.pull_request.head.sha }})
          VERSION="${{ steps.version.outputs.version }}"

          echo "Last commit: $COMMIT_MSG"

          if ! echo "$COMMIT_MSG" | grep -Eq '^chore\(release\): [0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Last commit must be: chore(release): $VERSION (got: $COMMIT_MSG)"
            exit 1
          fi

          MSG_VERSION=$(echo "$COMMIT_MSG" | sed -E 's/^chore\(release\): ([0-9]+\.[0-9]+\.[0-9]+)$/\1/')
          if [ "$MSG_VERSION" != "$VERSION" ]; then
            echo "::error::Commit message version ($MSG_VERSION) в‰  pyproject.toml ($VERSION)"
            exit 1
          fi

          echo "вњ… Last commit: chore(release): $VERSION"

      # в”Ђв”Ђ 7. Tag v{version} does not already exist в”Ђв”Ђ
      - name: Check tag does not already exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists вЂ” this version was already released"
            exit 1
          fi

          echo "вњ… Tag v$VERSION is available"

      # в”Ђв”Ђ Summary в”Ђв”Ђ
      - name: "рџ“‹ Summary"
        run: |
          echo "вњ… Release ${{ steps.version.outputs.version }} is ready to merge"
          {
            echo "## рџљЂ Release Readiness вЂ” v${{ steps.version.outputs.version }}"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| \`pyproject.toml\` version | вњ… \`${{ steps.version.outputs.version }}\` |"
            echo "| \`__init__.py\` fallback | вњ… matches |"
            echo "| CHANGELOG dated entry | вњ… present |"
            echo "| \`[Unreleased]\` section | вњ… empty |"
            echo "| Version bumped vs main | вњ… |"
            echo "| Commit message | вњ… \`chore(release): ${{ steps.version.outputs.version }}\` |"
            echo "| Tag \`v${{ steps.version.outputs.version }}\` | вњ… available |"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: AdolfoBOT вЂ” Notify Failure
    needs: [release-check]
    if: failure()
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Release Readiness"
      extra_context: |
        Release validation failed. Check the version files, changelog, and release commit message before retrying.
    secrets: inherit
