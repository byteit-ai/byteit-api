repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
        exclude: \.ipynb$
      
      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]
        exclude: \.ipynb$

  - repo: local
    hooks:
      - id: release-preflight
        name: release preflight checks
        entry: scripts/release_preflight.py
        args: [--pre-commit]
        language: python
        additional_dependencies:
          - build>=1.0.0
          - twine>=4.0.0
          - ruff==0.15.2
        pass_filenames: false
        files: ^(pyproject\.toml|byteit/__init__\.py|CHANGELOG\.md)$
        stages: [pre-commit]

      - id: release-commit-title
        name: release commit title check
        entry: scripts/release_preflight.py
        args: [--commit-msg]
        language: python
        pass_filenames: true
        stages: [commit-msg]